<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* TOPBAR */

#topbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#1c1c1c;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

#cookieCount{
font-size:26px;
font-weight:bold;
}

#cps{
position:absolute;
top:40px;
font-size:13px;
}

#storeButton{
position:absolute;
left:15px;
font-size:30px;
cursor:pointer;
}

#menuButton{
position:absolute;
right:15px;
font-size:30px;
cursor:pointer;
}

#diamonds{
position:absolute;
left:60px;
font-size:18px;
}

/* COOKIE */

#cookie{
width:220px;
margin-top:120px;
cursor:pointer;
}

/* STORE */

#store{
position:fixed;
left:-90%;
top:0;
width:90%;
height:100%;
background:#1b1b1b;
overflow:auto;
transition:.3s;
padding-top:70px;
}

#store.open{
left:0;
}

/* FILTER */

#shopFilter{
position:sticky;
top:0;
background:#1b1b1b;
padding:10px;
border-bottom:2px solid #333;
}

#shopFilter button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
}

#shopFilter select{
padding:6px;
border-radius:6px;
background:#333;
color:white;
border:none;
}

.shopTitle{
font-size:20px;
margin-top:20px;
}

.storeItem{
background:#2a2a2a;
margin:10px;
padding:14px;
border-radius:10px;
cursor:pointer;
}

.storeItem:hover{
background:#3a3a3a;
}

/* MENU */

#menu{
position:fixed;
top:70px;
right:-220px;
width:200px;
background:#222;
padding:20px;
transition:.3s;
}

#menu.open{
right:10px;
}

#menu button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

/* MESSAGE */

#message{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px 20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="topbar">

<div id="storeButton">🛒</div>
<div id="diamonds">💎 0</div>

<div id="cookieCount">0 Cookies</div>
<div id="cps">0 CPS</div>

<div id="menuButton">☰</div>

</div>

<img id="cookie" src="cookie.png">

<div id="store">

<div id="shopFilter">

<button onclick="setFilter('all')">Alle</button>
<button onclick="setFilter('machines')">Maschinen</button>
<button onclick="setFilter('upgrades')">Upgrades</button>
<button onclick="setFilter('diamonds')">Diamanten</button>

<br><br>

<select id="priceFilter" onchange="buildStore()">
<option value="all">Alle Preise</option>
<option value="1000">Unter 1K</option>
<option value="10000">Unter 10K</option>
<option value="100000">Unter 100K</option>
<option value="1000000">Unter 1M</option>
<option value="999999999999">∞</option>
</select>

</div>

<div id="shopContent"></div>

</div>

<div id="menu">

<button onclick="openSecret()">Secret</button>
<button onclick="resetGame()">Reset</button>
<button onclick="window.open('https://www.youtube.com/@ascodexOfficial')">
Press this button and Follow me on Youtube</button>

</div>

<div id="secretBox" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:25px;border-radius:10px;">
<h3>Secret Passwort</h3>
<input id="secretInput">
<br><br>
<button onclick="checkSecret()">OK</button>
</div>

<div id="message"></div>

<script>

/* VARIABLES */

let cookies=0n
let diamonds=0
let clickPower=1n
let shopFilter="all"

let buildings=[]
let upgrades=[]
let diamondShop=[]

let diamondsDisplay=document.getElementById("diamonds")

/* FORMAT */

function format(n){

n=BigInt(n)

if(n>1000000000000000000n)return "∞"
if(n>=1000000000n)return (Number(n/100000000n)/10)+"B"
if(n>=1000000n)return (Number(n/100000n)/10)+"M"
if(n>=1000n)return (Number(n/100n)/10)+"K"

return n.toString()

}

/* MANY MACHINES */

for(let i=1;i<=300;i++){

buildings.push({
name:"Maschine "+i,
cps:BigInt(i*5),
cost:BigInt(Math.floor(100*Math.pow(i,1.8))),
unlock:BigInt(i*500),
amount:0n
})

}

/* UPGRADES */

for(let i=1;i<=40;i++){

upgrades.push({
name:"Upgrade "+i,
cost:2000*i,
bought:false,
effect(){clickPower+=BigInt(i)}
})

}

/* DIAMOND SHOP */

for(let i=1;i<=20;i++){

diamondShop.push({
name:"Diamant Boost "+i,
cost:5+i,
bought:false,
effect(){clickPower+=10n}
})

}

/* CLICK */

cookie.onclick=()=>{

cookies+=clickPower

if(Math.random()<0.005){
diamonds++
showMessage("💎 Diamant!")
}

update()

}

/* STORE OPEN */

storeButton.onclick=()=>{
store.classList.toggle("open")
buildStore()
}

menuButton.onclick=()=>{
menu.classList.toggle("open")
}

/* FILTER */

function setFilter(type){
shopFilter=type
buildStore()
}

/* BUILD STORE */

function buildStore(){

shopContent.innerHTML=""
let maxPrice=document.getElementById("priceFilter").value

if(shopFilter==="all"||shopFilter==="machines")
addSection("🍪 Maschinen",buildings,true,false,maxPrice)

if(shopFilter==="all"||shopFilter==="upgrades")
addSection("⚡ Upgrades",upgrades,false,false,maxPrice)

if(shopFilter==="all"||shopFilter==="diamonds")
addSection("💎 Diamanten Shop",diamondShop,false,true,maxPrice)

}

function addSection(title,data,isBuilding,diamond,maxPrice){

let t=document.createElement("div")
t.className="shopTitle"
t.innerText=title
shopContent.appendChild(t)

data.forEach((item,i)=>{

if(isBuilding && cookies < item.unlock) return
if(item.bought) return
if(maxPrice!="all" && item.cost>maxPrice) return

let div=document.createElement("div")
div.className="storeItem"

div.innerHTML=`
${item.name}<br>
Kosten: ${diamond?"💎 "+item.cost:format(item.cost)}
${isBuilding?"<br>CPS: "+item.cps+"<br>Besitzt: "+item.amount:""}
`

div.onclick=()=>{
if(isBuilding)buyBuilding(i)
else if(diamond)buyDiamond(i)
else buyUpgrade(i)
}

shopContent.appendChild(div)

})

}

/* BUY */

function buyBuilding(i){

let b=buildings[i]

if(cookies>=b.cost){
cookies-=b.cost
b.amount++
}

update()
buildStore()

}

function buyUpgrade(i){

let u=upgrades[i]

if(cookies>=BigInt(u.cost)){
cookies-=BigInt(u.cost)
u.effect()
u.bought=true
}

update()
buildStore()

}

function buyDiamond(i){

let d=diamondShop[i]

if(diamonds>=d.cost){
diamonds-=d.cost
d.effect()
d.bought=true
}

update()
buildStore()

}

/* CPS */

function getCPS(){

let cps=0n

buildings.forEach(b=>{
cps+=b.amount*b.cps
})

return cps

}

/* GAME LOOP */

setInterval(()=>{
cookies+=getCPS()
cps.innerText=format(getCPS())+" CPS"
update()
},1000)

/* SECRET */

function openSecret(){
secretBox.style.display="block"
}

function checkSecret(){

if(secretInput.value==="MPJ17"){
cookies+=100000n
showMessage("Secret aktiviert!")
}else{
showMessage("Falsches Passwort")
}

secretBox.style.display="none"
update()

}

/* MESSAGE */

function showMessage(t){

message.innerText=t
message.style.display="block"

setTimeout(()=>message.style.display="none",2000)

}

/* SAVE */

function saveGame(){

localStorage.setItem("cookieSave",JSON.stringify({
cookies:cookies.toString(),
diamonds,
buildings,
upgrades,
last:Date.now()
}))

}

/* LOAD + OFFLINE */

function loadGame(){

let s=JSON.parse(localStorage.getItem("cookieSave"))

if(s){

cookies=BigInt(s.cookies)
diamonds=s.diamonds
buildings=s.buildings
upgrades=s.upgrades

let offlineSeconds=Math.floor((Date.now()-s.last)/1000)
let offlineGain=getCPS()*BigInt(offlineSeconds)

cookies+=offlineGain

if(offlineGain>0n){
showMessage("Offline Cookies: "+format(offlineGain))
}

}

}

setInterval(saveGame,5000)

/* RESET */

function resetGame(){

if(confirm("Spiel resetten?")){
localStorage.clear()
location.reload()
}

}

/* UPDATE */

function update(){

cookieCount.innerText=format(cookies)+" Cookies"
diamondsDisplay.innerText="💎 "+diamonds

}

/* START */

loadGame()
buildStore()
update()

</script>

</body>
</html>
