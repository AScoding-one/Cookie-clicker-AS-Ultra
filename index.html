<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA COOKIE CLICKER</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* TOPBAR */

#topbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#1c1c1c;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

#cookieCount{
font-size:26px;
font-weight:bold;
}

#cps{
position:absolute;
top:40px;
font-size:13px;
}

#diamondCount{
position:absolute;
top:10px;
right:80px;
color:#55d7ff;
}

#storeButton{
position:absolute;
left:15px;
font-size:30px;
cursor:pointer;
}

#menuButton{
position:absolute;
right:15px;
font-size:30px;
cursor:pointer;
}

#cookie{
width:240px;
margin-top:120px;
cursor:pointer;
}

/* STORE */

#store{
position:fixed;
left:-90%;
top:0;
width:90%;
height:100%;
background:#1b1b1b;
overflow:auto;
transition:0.3s;
padding-top:80px;
}

#store.open{
left:0;
}

.shopTitle{
font-size:22px;
margin-top:20px;
}

.storeItem{
background:#2a2a2a;
margin:10px;
padding:15px;
border-radius:10px;
cursor:pointer;
}

.storeItem:hover{
background:#3a3a3a;
}

/* MENU */

#menu{
position:fixed;
top:70px;
right:-220px;
width:200px;
background:#1b1b1b;
padding:20px;
transition:0.3s;
}

#menu.open{
right:10px;
}

#menu button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

#menu button:hover{
background:#555;
}

/* SECRET */

#secretBox{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:12px;
}

/* ACHIEVEMENTS */

#achievements{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#222;
padding:30px;
border-radius:12px;
width:320px;
max-height:400px;
overflow:auto;
}

.ach{
background:#333;
padding:8px;
margin:5px;
border-radius:8px;
}

/* MESSAGE */

#message{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px 20px;
border-radius:10px;
display:none;
}

#golden{
position:absolute;
width:90px;
display:none;
}

</style>
</head>

<body>

<div id="topbar">

<div id="storeButton">🛒</div>

<div id="cookieCount">0 Cookies</div>
<div id="cps">0 CPS</div>

<div id="diamondCount">💎 0</div>

<div id="menuButton">☰</div>

</div>

<div id="store"></div>

<div id="menu">

<button onclick="openAchievements()">🏆 Achievements</button>
<button onclick="openSecret()">🔑 Secret</button>
<button onclick="prestige()">⭐ Prestige</button>
<button onclick="resetGame()">♻ Reset</button>
<button onclick="window.open('https://www.youtube.com/@AScodingOfficial')">
Press this button and Follow me on Youtube</button>

</div>

<div id="secretBox">

<h3>Secret Passwort</h3>

<input id="secretInput">

<br><br>

<button onclick="checkSecret()">OK</button>

</div>

<div id="achievements">

<h3>Achievements</h3>

<div id="achList"></div>

<br>

<button onclick="achievements.style.display='none'">Close</button>

</div>

<div id="message"></div>

<img id="cookie" src="cookie.png">
<img id="golden" src="cookie.png">

<script>

/* VARIABLES */

let cookies=0
let diamonds=0
let clickPower=1
let prestigeLevel=0

let buildings=[]
let upgrades=[]
let diamondShop=[]

/* NUMBER FORMAT */

function format(n){

if(n>=1e12)return (n/1e12).toFixed(2)+"T"
if(n>=1e9)return (n/1e9).toFixed(2)+"B"
if(n>=1e6)return (n/1e6).toFixed(2)+"M"
if(n>=1e3)return (n/1e3).toFixed(2)+"K"

return Math.floor(n)

}

/* BUILDINGS */

for(let i=1;i<=200;i++){

buildings.push({

name:"Maschine "+i,
cps:i*5,
cost:100*Math.pow(i,1.6),
amount:0

})

}

/* MANY UPGRADES */

for(let i=1;i<=120;i++){

upgrades.push({

name:"Upgrade "+i,
cost:500*i,
bought:false,

effect(){

clickPower+=1+i*0.1

}

})

}

/* DIAMOND SHOP */

for(let i=1;i<=40;i++){

diamondShop.push({

name:"Diamant Upgrade "+i,
cost:3+i,
bought:false,

effect(){

clickPower+=5

}

})

}

/* CLICK */

cookie.onclick=()=>{

cookies+=clickPower

if(Math.random()<0.02){
diamonds++
showMessage("💎 Diamant!")
}

update()

}

/* STORE */

storeButton.onclick=()=>{

store.classList.toggle("open")
buildStore()

}

menuButton.onclick=()=>menu.classList.toggle("open")

function buildStore(){

store.innerHTML=""

/* BUILDINGS */

let t1=document.createElement("div")
t1.className="shopTitle"
t1.innerText="🍪 Maschinen"
store.appendChild(t1)

buildings.forEach((b,i)=>{

let div=document.createElement("div")
div.className="storeItem"

div.innerHTML=`
${b.name}<br>
CPS: ${format(b.cps)}<br>
Kosten: ${format(b.cost)}<br>
Besitzt: ${b.amount}
`

div.onclick=()=>buyBuilding(i)

store.appendChild(div)

})

/* UPGRADES */

let t2=document.createElement("div")
t2.className="shopTitle"
t2.innerText="⚡ Upgrades"
store.appendChild(t2)

upgrades.forEach((u,i)=>{

if(u.bought)return

let div=document.createElement("div")
div.className="storeItem"

div.innerHTML=`
${u.name}<br>
Kosten: ${format(u.cost)}
`

div.onclick=()=>buyUpgrade(i)

store.appendChild(div)

})

/* DIAMOND SHOP */

let t3=document.createElement("div")
t3.className="shopTitle"
t3.innerText="💎 Diamanten Shop"
store.appendChild(t3)

diamondShop.forEach((d,i)=>{

if(d.bought)return

let div=document.createElement("div")
div.className="storeItem"

div.innerHTML=`
${d.name}<br>
Kosten: 💎 ${d.cost}
`

div.onclick=()=>buyDiamond(i)

store.appendChild(div)

})

}

/* BUY FUNCTIONS */

function buyBuilding(i){

let b=buildings[i]

if(cookies>=b.cost){

cookies-=b.cost
b.amount++

showMessage("Gekauft: "+b.name)

}else showMessage("Nicht genug Cookies")

update()
buildStore()

}

function buyUpgrade(i){

let u=upgrades[i]

if(cookies>=u.cost){

cookies-=u.cost
u.effect()
u.bought=true

showMessage("Upgrade gekauft!")

}else showMessage("Nicht genug Cookies")

update()
buildStore()

}

function buyDiamond(i){

let d=diamondShop[i]

if(diamonds>=d.cost){

diamonds-=d.cost
d.effect()
d.bought=true

showMessage("Diamanten Upgrade!")

}else showMessage("Nicht genug Diamanten")

update()
buildStore()

}

/* CPS */

function getCPS(){

let cps=0

buildings.forEach(b=>{
cps+=b.amount*b.cps
})

return cps

}

/* PRODUCTION */

setInterval(()=>{

cookies+=getCPS()

cps.innerText=format(getCPS())+" CPS"

update()

},1000)

/* GOLDEN COOKIE */

setInterval(()=>{

golden.style.left=Math.random()*window.innerWidth+"px"
golden.style.top=120+Math.random()*300+"px"

golden.style.display="block"

setTimeout(()=>golden.style.display="none",5000)

},25000)

golden.onclick=()=>{

cookies+=cookies*0.5

showMessage("Golden Cookie!")

golden.style.display="none"

update()

}

/* SECRET */

function openSecret(){

secretBox.style.display="block"

}

function checkSecret(){

if(secretInput.value==="MPJ17"){

cookies+=1000000

showMessage("Secret aktiviert!")

}else{

showMessage("Falsches Passwort")

}

secretBox.style.display="none"

update()

}

/* ACHIEVEMENTS (50) */

let achievements=[]

for(let i=1;i<=50;i++){

achievements.push({

name:"Cookie Master "+i,
goal:1000*i,
done:false

})

}

function checkAchievements(){

achievements.forEach(a=>{

if(!a.done && cookies>=a.goal){

a.done=true

diamonds+=2

showMessage("🏆 Achievement!")

}

})

}

function openAchievements(){

achievements.style.display="block"

achList.innerHTML=""

achievements.forEach(a=>{

let div=document.createElement("div")
div.className="ach"

div.innerText=a.name+(a.done?" ✅":"")

achList.appendChild(div)

})

}

/* OFFLINE PROGRESS */

function offlineProgress(){

let last=localStorage.getItem("lastTime")

if(last){

let diff=(Date.now()-last)/1000

let gain=diff*getCPS()

cookies+=gain

if(gain>0){

showMessage("🌍 Offline Gewinn: "+format(gain))

}

}

}

/* SAVE */

function saveGame(){

localStorage.setItem("lastTime",Date.now())

localStorage.setItem("cookieSave",JSON.stringify({

cookies,
diamonds,
clickPower,
prestigeLevel,
buildings,
upgrades,
diamondShop

}))

}

function loadGame(){

let s=JSON.parse(localStorage.getItem("cookieSave"))

if(s){

cookies=s.cookies
diamonds=s.diamonds
clickPower=s.clickPower
prestigeLevel=s.prestigeLevel
buildings=s.buildings
upgrades=s.upgrades
diamondShop=s.diamondShop

}

}

setInterval(saveGame,5000)

/* RESET */

function resetGame(){

if(confirm("Spiel wirklich resetten?")){

localStorage.clear()
location.reload()

}

}

/* MESSAGE */

function showMessage(t){

message.innerText=t
message.style.display="block"

setTimeout(()=>message.style.display="none",2000)

}

/* UPDATE */

function update(){

cookieCount.innerText=format(cookies)+" Cookies"
diamondCount.innerText="💎 "+diamonds

checkAchievements()

}

/* START */

loadGame()
offlineProgress()
buildStore()
update()

</script>

</body>
</html>
