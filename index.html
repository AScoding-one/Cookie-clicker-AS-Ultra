<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#1a1a1a,#0e0e0e);color:white;text-align:center;overflow-x:hidden;}
#topbar{position:fixed;top:0;width:100%;height:70px;background:#1c1c1c;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 2px 10px black;}
#cookieCount{font-size:26px;font-weight:bold;}
#cps{position:absolute;top:40px;font-size:13px;color:#bbb;}
#storeButton{position:absolute;left:15px;top:15px;font-size:30px;cursor:pointer;z-index:51;}
#menuButton{position:absolute;right:15px;top:15px;font-size:30px;cursor:pointer;z-index:51;}
#diamonds{position:absolute;left:60px;font-size:18px;}
#cookie{width:70vw;max-width:420px;margin-top:130px;cursor:pointer;transition:transform .08s;}
#cookie.pop{transform:scale(1.12) rotate(3deg);}
#store{position:fixed;top:70px;left:0;width:90%;height:calc(100% - 70px);background:#1b1b1b;overflow:auto;transform: translateX(-100%);transition: transform .5s ease;z-index:999;padding-top:10px;}
#store.open{transform: translateX(0);}
#shopFilter{position:sticky;top:0;background:#1b1b1b;padding:12px;border-bottom:2px solid #333;}
.filterBtn{margin:4px;padding:8px 14px;border:none;border-radius:20px;background:#333;color:white;cursor:pointer;}
.storeItem{background:#2a2a2a;margin:10px;padding:14px;border-radius:10px;cursor:pointer;}
.storeItem:hover{background:#3a3a3a;}
#menu{position:fixed;top:70px;right:0;width:200px;height:calc(100% - 70px);background:#222;padding:20px;transform: translateX(100%);transition: transform .5s ease;z-index:999;}
#menu.open{transform: translateX(0);}
#menu button{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#333;color:white;cursor:pointer;}
#secretBox{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:25px;border-radius:10px;z-index:1000;}
#message{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;padding:10px 20px;border-radius:10px;display:none;z-index:1001;}
  /* ANIMATION FÜR ZAHLEN */
  .floatNumber{
  position:absolute;
  font-weight:bold;
  color:yellow;
  animation: floatUp 1s ease-out forwards;
  z-index:1002;
}
@keyframes floatUp{
  0%{opacity:1; transform:translateY(0);}
  100%{opacity:0; transform:translateY(-50px);}
}
</style
</style>
</head>
<body>

<div id="topbar">
  <div id="storeButton">🛒</div>
  <div id="diamonds">💎 0</div>
  <div id="cookieCount">0 Cookies 🍪😊</div>
  <div id="cps">0 CPS</div>
  <div id="menuButton">☰</div>
</div>

<img id="cookie" src="cookie.png">

<div id="store">
  <div id="shopFilter">
    <button class="filterBtn" onclick="setFilter('machines')">Maschinen</button>
    <button class="filterBtn" onclick="setFilter('upgrades')">Upgrades</button>
    <button class="filterBtn" onclick="setFilter('diamonds')">Diamanten</button>
  </div>
  <div id="shopContent"></div>
</div>

<div id="menu">
  <button id="secretBtn">Secret</button>
  <button onclick="resetGame()">Reset</button>
  <button onclick="window.open('https://www.youtube.com/@ascodexOfficial')">Press this button and follow me and my friend Phillip on youtube</button>
  <button onclick="window.open('https://www.instagram.com/ascodexofficial/')">Instagram</button>
</div>

<div id="secretBox">
<h3>Secret Passwort</h3>
<input id="secretInput"><br><br>
<button onclick="checkSecret()">OK</button>
</div>

<div id="message"></div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

let cookies=0n, diamonds=0n, clickPower=1n, shopFilter="machines", buildings=[], upgrades=[];

const cookie=document.getElementById("cookie"),
      cookieCount=document.getElementById("cookieCount"),
      cpsEl=document.getElementById("cps"),
      message=document.getElementById("message"),
      secretBox=document.getElementById("secretBox"),
      secretInput=document.getElementById("secretInput"),
      diamondsEl=document.getElementById("diamonds"),
      store=document.getElementById("store"),
      menu=document.getElementById("menu"),
      storeButton=document.getElementById("storeButton"),
      menuButton=document.getElementById("menuButton"),
      secretBtn=document.getElementById("secretBtn"),
      shopContent=document.getElementById("shopContent");

/* BUILDINGS */
for(let i=1;i<=50;i++){
  buildings.push({name:"Maschine "+i,cps:BigInt(i*3),cost:BigInt(Math.floor(100*Math.pow(i,1.8))),amount:0n});
}

/* UPGRADES */
upgrades=[
  {name:"Stärkerer Klick",cost:500n,type:"click",multiplier:2n,bought:false},
  {name:"Ofenhandschuhe",cost:5000n,type:"click",multiplier:5n,bought:false},
  {name:"Auto-Klicker V1",cost:20000n,type:"click",multiplier:10n,bought:false}
];

/* RENDER SHOP */
function renderShop(){
  shopContent.innerHTML="";
  if(shopFilter==="machines"){
    buildings.forEach(b=>{
      const div=document.createElement("div");
      div.className="storeItem";
      div.innerHTML=`${b.name}<br>${b.amount} Stück<br>Preis: ${b.cost} Cookies`;
      div.onclick=()=>{if(cookies>=b.cost){cookies-=b.cost;b.amount+=1n;b.cost=b.cost*12n/10n;update();renderShop();} else showMessage("Nicht genug Cookies!")};
      shopContent.appendChild(div);
    });
  } else if(shopFilter==="upgrades"){
    upgrades.forEach(u=>{
      if(!u.bought){
        const div=document.createElement("div");
        div.className="storeItem";
        div.innerHTML=`${u.name}<br>Klick-Power x${u.multiplier}<br>Preis: ${u.cost} Cookies`;
        div.onclick=()=>{
          if(cookies>=u.cost){cookies-=u.cost; u.bought=true; clickPower*=u.multiplier; update(); renderShop(); showMessage("Upgrade gekauft!")} 
          else showMessage("Nicht genug Cookies!")};
        shopContent.appendChild(div);
      }
    });
  } else if(shopFilter==="diamonds"){
    const dShop=[
      {name:"1 Million Cookies",cost:10,reward:1000000n},
      {name:"Klick-Boost (Permanent)",cost:50,reward:"boost"}
    ];
    dShop.forEach(item=>{
      const div=document.createElement("div");
      div.className="storeItem";
      div.innerHTML=`${item.name}<br>💎 ${item.cost}`;
      div.onclick=()=>{
        if(diamonds>=item.cost){
          diamonds-=item.cost;
          if(typeof item.reward==="bigint") cookies+=item.reward;
          else if(item.reward==="boost") clickPower*=2n;
          update(); renderShop(); showMessage("Gekauft!");
        } else showMessage("Zu wenig Diamanten!");
      };
      shopContent.appendChild(div);
    });
  }
}

/* COOKIE CLICK */
cookie.onclick=()=>{ 
  cookies+=clickPower; cookie.classList.add("pop"); 
  setTimeout(()=>cookie.classList.remove("pop"),100); 
  if(Math.random()<0.01){diamonds++; showMessage("💎 Diamant gefunden!")} update(); }
  
  /* FLOATING NUMBER */
function showFloatingNumber(text){
  const num=document.createElement("div");
  num.className="floatNumber";
  num.innerText=text;
  document.body.appendChild(num);
  const rect=cookie.getBoundingClientRect();
  num.style.left=(rect.left+rect.width/2-20)+"px";
  num.style.top=(rect.top-20)+"px";
  setTimeout(()=>num.remove(),1000);
}

/* UPDATE */
function update(){
  cookieCount.innerText=cookies+" Cookies";
  diamondsEl.innerText="💎 "+diamonds;
}

/* CPS */
function getCPS(){let total=0n; buildings.forEach(b=>total+=b.amount*b.cps); return total;}
setInterval(()=>{cookies+=getCPS(); cpsEl.innerText=getCPS()+" CPS"; update();},1000);

/* SAVE / LOAD */
function saveGame(){
  const data={
    cookies:cookies.toString(),
    diamonds:diamonds.toString(),
    clickPower:clickPower.toString(),
    buildings:buildings.map(b=>({amount:b.amount.toString(),cost:b.cost.toString()})),
    upgrades:upgrades.map(u=>u.bought),
    time:Date.now()
  };
  localStorage.setItem("cookieSave",JSON.stringify(data));
}

function loadGame(){
  const saved=localStorage.getItem("cookieSave");
  if(!saved) return;
  const data=JSON.parse(saved);
  cookies=BigInt(data.cookies);
  diamonds=BigInt(data.diamonds);
  clickPower=BigInt(data.clickPower);
  data.buildings.forEach((b,i)=>{buildings[i].amount=BigInt(b.amount); buildings[i].cost=BigInt(b.cost);});
  data.upgrades.forEach((b,i)=>{upgrades[i].bought=b; if(b) clickPower*=upgrades[i].multiplier;});
  const diff=Math.floor((Date.now()-data.time)/1000);
  const offlineGain=getCPS()*BigInt(diff);
  if(offlineGain>0n){cookies+=offlineGain; showMessage("Offline: "+offlineGain+" Cookies!")};
  update(); renderShop();
}

setInterval(saveGame,5000);

/* SHOW MESSAGE */
function showMessage(t){message.innerText=t; message.style.display="block"; setTimeout(()=>message.style.display="none",2000);}

/* SECRET */
function openSecret(){secretBox.style.display="block"; secretInput.value="";}
function checkSecret(){
  const pass = secretInput.value;
  if(pass==="MPJ17"){showMessage("🎉 MPJ17 korrekt!"); cookies+=1000n; diamonds+=5n;}
  else if(pass==="MPJ15"){showMessage("💎💎💎 Mega Bonus!"); cookies+=9999999n; diamonds+=999999n;}
  else{showMessage("❌ Falsches Passwort!")}
  secretBox.style.display="none"; update(); renderShop();
}

/* STORE & MENU TOGGLE */
storeButton.addEventListener("click", ()=>store.classList.toggle("open"));
menuButton.addEventListener("click", ()=>menu.classList.toggle("open"));
secretBtn.addEventListener("click", openSecret);

/* FILTER */
window.setFilter=f=>{shopFilter=f; renderShop();};

/* RESET */
window.resetGame=()=>{cookies=0n; diamonds=0n; buildings.forEach(b=>b.amount=0n); upgrades.forEach(u=>u.bought=false); clickPower=1n; update(); renderShop(); localStorage.removeItem("cookieSave");}

/* INITIALIZE */
loadGame(); renderShop(); update();
window.checkSecret=checkSecret;

});
</script>

</body>
</html>
