<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Clicker</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* TOPBAR */

#topbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:#1c1c1c;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

#cookieCount{
font-size:26px;
font-weight:bold;
}

#cps{
position:absolute;
top:40px;
font-size:13px;
}

#storeButton{
position:absolute;
left:15px;
font-size:30px;
cursor:pointer;
}

#menuButton{
position:absolute;
right:15px;
font-size:30px;
cursor:pointer;
}

/* COOKIE */

#cookie{
width:220px;
margin-top:120px;
cursor:pointer;
}

/* STORE */

#store{
position:fixed;
left:-90%;
top:0;
width:90%;
height:100%;
background:#1b1b1b;
overflow:auto;
transition:.3s;
padding-top:70px;
}

#store.open{
left:0;
}

/* FILTER */

#shopFilter{
position:sticky;
top:0;
background:#1b1b1b;
padding:10px;
border-bottom:2px solid #333;
z-index:5;
}

#shopFilter button{
margin:3px;
padding:6px 10px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
}

#shopFilter button:hover{
background:#555;
}

#shopFilter select{
padding:6px;
border-radius:6px;
background:#333;
color:white;
border:none;
}

/* SHOP ITEMS */

.shopTitle{
font-size:20px;
margin-top:20px;
}

.storeItem{
background:#2a2a2a;
margin:10px;
padding:14px;
border-radius:10px;
cursor:pointer;
}

.storeItem:hover{
background:#3a3a3a;
}

/* MENU */

#menu{
position:fixed;
top:70px;
right:-220px;
width:200px;
background:#222;
padding:20px;
transition:.3s;
}

#menu.open{
right:10px;
}

#menu button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

/* MESSAGE */

#message{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px 20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="topbar">

<div id="storeButton">🛒</div>

<div id="cookieCount">0 Cookies</div>
<div id="cps">0 CPS</div>

<div id="menuButton">☰</div>

</div>

<img id="cookie" src="cookie.png">

<div id="store">

<div id="shopFilter">

<button onclick="setFilter('all')">Alle</button>
<button onclick="setFilter('machines')">Maschinen</button>
<button onclick="setFilter('upgrades')">Upgrades</button>
<button onclick="setFilter('diamonds')">Diamanten</button>

<br><br>

<select id="priceFilter" onchange="buildStore()">
<option value="all">Alle Preise</option>
<option value="1000">Unter 1K</option>
<option value="10000">Unter 10K</option>
<option value="100000">Unter 100K</option>
<option value="1000000">Unter 1M</option>
<option value="999999999999">∞ Unendlich</option>
</select>

</div>

<div id="shopContent"></div>

</div>

<div id="menu">

<button onclick="openSecret()">Secret</button>
<button onclick="resetGame()">Reset</button>
<button onclick="window.open('https://www.youtube.com/@AScodingOfficial')">
  Press this button and Follow me on Youtube</button>

</div>

<div id="secretBox" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:25px;border-radius:10px;">
<h3>Secret Passwort</h3>
<input id="secretInput">
<br><br>
<button onclick="checkSecret()">OK</button>
</div>

<div id="message"></div>

<script>

/* VARIABLES */

let cookies=0
let clickPower=1
let shopFilter="all"
let diamonds=0

let buildings=[]
let upgrades=[]
let diamondShop=[]

/* FORMAT */

function format(n){

if(n>=1e9)return (n/1e9).toFixed(1)+"B"
if(n>=1e6)return (n/1e6).toFixed(1)+"M"
if(n>=1e3)return (n/1e3).toFixed(1)+"K"

return Math.floor(n)

}

/* BUILDINGS */

for(let i=1;i<=100;i++){

buildings.push({

name:"Maschine "+i,
cps:i*5,
cost:100*Math.pow(i,1.6),
unlock:i*500,
amount:0

})

}

/* UPGRADES */

for(let i=1;i<=40;i++){

upgrades.push({

name:"Upgrade "+i,
cost:2000*i,
bought:false,
effect(){clickPower+=i}

})

}

/* DIAMOND SHOP */

for(let i=1;i<=20;i++){

diamondShop.push({

name:"Diamant Boost "+i,
cost:5+i,
bought:false,
effect(){clickPower+=10}

})

}

/* CLICK */

cookie.onclick=()=>{

cookies+=clickPower

if(Math.random()<0.02){
diamonds++
showMessage("💎 Diamant!")
}

update()

}

/* FILTER */

function setFilter(type){

shopFilter=type
buildStore()

}

/* STORE OPEN */

storeButton.onclick=()=>{

store.classList.toggle("open")
buildStore()

}

menuButton.onclick=()=>menu.classList.toggle("open")

/* BUILD STORE */

function buildStore(){

shopContent.innerHTML=""

let maxPrice=document.getElementById("priceFilter").value

if(shopFilter==="all"||shopFilter==="machines")
addSection("🍪 Maschinen",buildings,true,false,maxPrice)

if(shopFilter==="all"||shopFilter==="upgrades")
addSection("⚡ Upgrades",upgrades,false,false,maxPrice)

if(shopFilter==="all"||shopFilter==="diamonds")
addSection("💎 Diamanten Shop",diamondShop,false,true,maxPrice)

}

function addSection(title,data,isBuilding,diamond,maxPrice){

let t=document.createElement("div")
t.className="shopTitle"
t.innerText=title
shopContent.appendChild(t)

data.forEach((item,i)=>{

if(isBuilding && cookies < item.unlock) return

if(item.bought) return

if(maxPrice!="all" && item.cost>maxPrice) return

let div=document.createElement("div")
div.className="storeItem"

div.innerHTML=`
${item.name}<br>
Kosten: ${diamond?"💎 "+item.cost:format(item.cost)}
${isBuilding?"<br>CPS: "+item.cps+"<br>Besitzt: "+item.amount:""}
`

div.onclick=()=>{

if(isBuilding)buyBuilding(i)
else if(diamond)buyDiamond(i)
else buyUpgrade(i)

}

shopContent.appendChild(div)

})

}

/* BUY */

function buyBuilding(i){

let b=buildings[i]

if(cookies>=b.cost){

cookies-=b.cost
b.amount++

}

update()
buildStore()

}

function buyUpgrade(i){

let u=upgrades[i]

if(cookies>=u.cost){

cookies-=u.cost
u.effect()
u.bought=true

}

update()
buildStore()

}

function buyDiamond(i){

let d=diamondShop[i]

if(diamonds>=d.cost){

diamonds-=d.cost
d.effect()
d.bought=true

}

update()
buildStore()

}

/* CPS */

function getCPS(){

let cps=0
buildings.forEach(b=>cps+=b.amount*b.cps)
return cps

}

/* GAME LOOP */

setInterval(()=>{

cookies+=getCPS()
cps.innerText=format(getCPS())+" CPS"

update()

},1000)

/* SECRET */

function openSecret(){

secretBox.style.display="block"

}

function checkSecret(){

if(secretInput.value==="MPJ17"){

cookies+=1000000
showMessage("Secret aktiviert!")

}else{

showMessage("Falsches Passwort")

}

secretBox.style.display="none"
update()

}

/* MESSAGE */

function showMessage(t){

message.innerText=t
message.style.display="block"

setTimeout(()=>message.style.display="none",2000)

}

/* SAVE */

function saveGame(){

localStorage.setItem("cookieSave",JSON.stringify({
cookies,
diamonds,
buildings,
upgrades
}))

}

function loadGame(){

let s=JSON.parse(localStorage.getItem("cookieSave"))

if(s){

cookies=s.cookies
diamonds=s.diamonds
buildings=s.buildings
upgrades=s.upgrades

}

}

setInterval(saveGame,5000)

/* RESET */

function resetGame(){

if(confirm("Spiel resetten?")){

localStorage.clear()
location.reload()

}

}

/* UPDATE */

function update(){

cookieCount.innerText=format(cookies)+" Cookies"

}

/* START */

loadGame()
buildStore()
update()

</script>

</body>
</html>
